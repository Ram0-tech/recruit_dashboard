{% extends 'students/base.html' %}

{% block content %}
<div class="row mb-3">
    <div class="col-md-6">
        <h2>Students</h2>
    </div>
    <div class="col-md-6 text-end">
        <form class="d-flex" method="GET" action="{% url 'student_list' %}">
            <input class="form-control me-2" type="search" name="q" placeholder="Search by Course Interest" value="{{ query }}">
            <button class="btn btn-outline-primary" type="submit">Search</button>
        </form>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course Interest</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.name }}</td>
                    <td>{{ student.email }}</td>
                    <td>{{ student.course_interest }}</td>
                    <td>
                        <span class="badge {% if student.status == 'Accepted' %}bg-success{% elif student.status == 'Rejected' %}bg-danger{% elif student.status == 'Interviewing' %}bg-warning text-dark{% else %}bg-secondary{% endif %}">
                            {{ student.status }}
                        </span>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center py-4 text-muted">No students found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
